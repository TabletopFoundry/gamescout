version: 2

updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 10
    groups:
      next-ecosystem:
        patterns:
          - "next"
          - "eslint-config-next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      dev-dependencies:
        dependency-type: development
        exclude-patterns:
          - "next"
          - "eslint-config-next"
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
